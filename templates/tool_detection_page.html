<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Tool Detection</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }
        input, button {
            margin: 10px;
            padding: 10px;
        }
        video {
            width: 80%;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header class="sticky top-0 app-header-dark z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <div class="text-2xl font-bold text-white tracking-wide cursor-pointer" onclick="window.location.href='{{ url_for('index') }}'">
                Surgi<span class="text-primary-red">Mind</span>
            </div>
            <div class="flex items-center space-x-3 sm:space-x-6">
                <nav class="hidden md:flex space-x-6 text-base font-medium">
                    <a href="{{ url_for('dashboard') }}" class="nav-link-glow">Dashboard</a>
                    <a href="{{ url_for('upload') }}" class="nav-link-glow active">Upload Report</a>
                    <a href="{{ url_for('tool_detection_page') }}" class="nav-link-glow">Tool Detection</a>
                    <a href="#" class="nav-link-glow">History</a>
                    <a href="#" class="nav-link-glow">Help</a>
                    <a href="{{ url_for('logout') }}" class="nav-link-Glow text-red-400">Logout</a>
                </nav>
                <div class="flex items-center space-x-3">
                    {% if user %}
                    <span class="text-sm text-gray-400 hidden md:inline">{{ user.name }}</span>
                    
                    {% if user.picture %}
                        <img src="{{ user.picture }}" alt="Profile" class="h-10 w-10 rounded-full border-2 border-white">
                    {% elif user.name %}
                        <div class="h-10 w-10 rounded-full bg-primary-red flex items-center justify-center text-white font-bold cursor-pointer border-2 border-white">
                            {{ user.name.split(' ')|map('first')|join('')|upper }}
                        </div>
                    {% endif %}
                    {% endif %}
                </div>
            </div>
        </div>
    </header>

    
<h2>🔍 Real-Time Surgical Tool Detection</h2>

<input type="file" id="videoInput" accept="video/*" class="mb-4">

<button onclick="startToolDetection()"
        class="bg-primary-red px-4 py-2 rounded-lg text-white font-semibold">
    Start Tool Detection
</button>


<img id="videoStream"
     class="mt-6 rounded-xl border border-gray-600 w-full max-w-4xl"/>




</body>
</html>

<script>
async function startToolDetection() {
    const input = document.getElementById("videoInput");
    if (!input.files.length) {
        alert("Please select a video");
        return;
    }

    const formData = new FormData();
    formData.append("video", input.files[0]);

    const res = await fetch("/upload_video", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("videoStream").src = data.video_url;
    }
}
</script>
